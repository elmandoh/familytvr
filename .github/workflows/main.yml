name: Auto Post to Blogger

on:
  schedule:
    - cron: '0 */2 * * *'  # النشر التلقائي كل 4 ساعات
  workflow_dispatch:        # السطر ده هو اللي بيرجع زرار الـ Run اليدوي
jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Code
        uses: actions/checkout@v3

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.9'

      - name: Install Dependencies
        run: |
          python -m pip install --upgrade pip
          pip install requests

      - name: Run Blogger Script
        env:
          GROQ_API_KEY: ${{ secrets.GROQ_API_KEY }}
          SENDER_EMAIL: ${{ secrets.SENDER_EMAIL }}
          SENDER_PASSWORD: ${{ secrets.SENDER_PASSWORD }}
          BLOGGER_EMAIL: ${{ secrets.BLOGGER_EMAIL }}
        run: python main.py

      - name: Install dependencies
        run: |
          pip install requests atproto
      - name: Install dependencies
        run: |
            pip install requests atproto groq
      - name: Run Share Script (Only if new post exists)
        env:
          BSKY_HANDLE_1: ${{ secrets.BSKY_HANDLE_1 }}
          BSKY_PASSWORD_1: ${{ secrets.BSKY_PASSWORD_1 }}
          BSKY_HANDLE_2: ${{ secrets.BSKY_HANDLE_2 }}
          BSKY_PASSWORD_2: ${{ secrets.BSKY_PASSWORD_2 }}
        run: python share.py
